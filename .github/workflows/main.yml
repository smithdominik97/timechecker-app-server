name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main # Change this to your branch name

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install rsync
      run: sudo apt-get update && sudo apt-get install -y rsync

    - name: Deploy via SSH
      uses: easingthemes/ssh-deploy@main
      with:
        REMOTE_HOST: ${{ secrets.DROPLET_IP }}
        ARGS: "-rlgoDzvc -i --delete"
        REMOTE_USER: ${{ secrets.DROPLET_USERNAME }}
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SOURCE: "php/*" # Change this to the directory where your PHP files are located
        TARGET: "/var/www/html/" # Change this to the directory on your droplet
        EXCLUDE: "/.github/"